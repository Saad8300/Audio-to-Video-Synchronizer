<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a5f3fc" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- App icon background -->
  <rect width="1024" height="1024" rx="240" ry="240" fill="url(#bg)" />

  <!-- Inner subtle glow overlay -->
  <rect width="1024" height="1024" rx="240" ry="240"
        fill="none"
        stroke="rgba(255,255,255,0.12)"
        stroke-width="2" />

  <!-- Bold sync/frame mark: two film-frame rectangles overlapping with a lightning bolt -->
  <!-- Left frame -->
  <rect x="180" y="260" width="290" height="380" rx="40" ry="40"
        fill="none" stroke="url(#icon)" stroke-width="52"
        filter="url(#glow)" />

  <!-- Right frame (offset) -->
  <rect x="360" y="320" width="290" height="380" rx="40" ry="40"
        fill="none" stroke="url(#icon)" stroke-width="52"
        opacity="0.7"
        filter="url(#glow)" />

  <!-- Central lightning bolt / sync arrow — bold and readable -->
  <path
    d="M556 230 L420 530 L510 530 L468 794 L640 450 L544 450 Z"
    fill="url(#icon)"
    filter="url(#glow)"
  />
</svg>
